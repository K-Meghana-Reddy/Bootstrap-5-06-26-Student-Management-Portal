<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
<h2>Student Registration</h2>

<form class="needs-validation" novalidate>

<input type="text" class="form-control mb-3" placeholder="Full Name" required>

<input type="text" class="form-control mb-3" placeholder="Roll Number" required>

<input type="email" class="form-control mb-3" placeholder="Email" required>

<input type="tel" class="form-control mb-3" placeholder="Mobile Number" minlength="10" maxlength="10" required>

<select class="form-select mb-3">
<option>Male</option>
<option>Female</option>
</select>

<select class="form-select mb-3">
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
</select>

<input type="date" class="form-control mb-3">

<textarea class="form-control mb-3" placeholder="Address"></textarea>

<input type="file" class="form-control mb-3">

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">Accept Terms</label>
</div>

<button class="btn btn-success">Submit</button>

</form>
</div>

</body>
</html>
